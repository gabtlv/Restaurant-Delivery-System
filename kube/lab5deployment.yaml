    spec:
      containers:
      - name: menuservice
        image: gabtlv/coe692:menuservice
        ports:
        - containerPort: 8080
        env:
        - name: DB_URL
          value: menudb:3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orderservice
spec:
  replicas: 1
  selector:
